# Full CI/CD pipeline: Docker app → infra → deploy to K8s per env

name: CI CD

on:
  push:
    branches:
      - main
      - 'feature/*'
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  # --- CI: always run (build + test) ---
  call_ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  # --- CD: only on merge to develop (pull_request merged) — build image then sequential promotion with infra before each deploy ---
  call_docker_build:
    name: Docker build
    uses: ./.github/workflows/docker-build.yml
    needs: [call_ci]
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'develop' && success()
    secrets: inherit

  call_infra_dev:
    name: Infra dev
    uses: ./.github/workflows/infra.yml
    needs: [call_docker_build]
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'develop' && success()
    with:
      env: dev
    secrets: inherit

  call_deploy_dev:
    name: Deploy dev
    uses: ./.github/workflows/deploy.yml
    needs: [call_infra_dev]
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'develop' && success()
    with:
      env: dev
    secrets: inherit

  call_infra_stage:
    name: Infra stage
    uses: ./.github/workflows/infra.yml
    needs: [call_deploy_dev]
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'develop' && success()
    with:
      env: stage
    secrets: inherit

  call_deploy_stage:
    name: Deploy stage
    uses: ./.github/workflows/deploy.yml
    needs: [call_infra_stage]
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'develop' && success()
    with:
      env: stage
    secrets: inherit

  call_infra_prod:
    name: Infra prod
    uses: ./.github/workflows/infra.yml
    needs: [call_deploy_stage]
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'develop' && success()
    with:
      env: prod
    secrets: inherit

  call_deploy_prod:
    name: Deploy prod
    uses: ./.github/workflows/deploy.yml
    needs: [call_infra_prod]
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'develop' && success()
    with:
      env: prod
    secrets: inherit
